{{- if and .Values.postgresql.enabled (or .Values.postgresql.enableConnectionPooler .Values.postgresql.enableReplicaConnectionPooler) }}
{{- $p := .Values.postgresql.poolerConfig | default dict }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: pgbouncer-config
  namespace: postgres
data:
  pgbouncer.ini: |
    [databases]
    * = host=pg-cluster.postgres.svc.cluster.local port=5432 auth_user=pooler
    postgres = host=pg-cluster.postgres.svc.cluster.local port=5432 auth_user=pooler

    [pgbouncer]
    pool_mode = {{ $p.poolMode | default "transaction" }}
    listen_port = {{ $p.listenPort | default 5432 }}
    listen_addr = *
    admin_users = pooler
    auth_dbname = postgres
    auth_file = /etc/pgbouncer/userlist.txt
    auth_query = SELECT * FROM pooler.user_lookup($1)
    auth_type = scram-sha-256
    server_tls_sslmode = require
    log_connections = 0
    log_disconnections = 0
    max_prepared_statements = 200
    default_pool_size = {{ $p.defaultPoolSize | default 20 }}
    reserve_pool_size = {{ $p.reservePoolSize | default 10 }}
    max_client_conn = {{ $p.maxClientConn | default 10000 }}
    max_db_connections = {{ $p.maxDBConnections | default 60 }}
    idle_transaction_timeout = 600
    server_login_retry = 5
    ignore_startup_parameters = extra_float_digits,options
{{- end }}
