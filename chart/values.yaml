ambient: true

postgresql:
  enabled: false
  parameters: []
  ingress: []
  resources:
    limits:
      cpu: 500m
      memory: 500Mi
    requests:
      cpu: 100m
      memory: 100Mi
  additionalVolumes: []
  env: []

  # Connection pooler options
  # Ref: https://opensource.zalando.com/postgres-operator/docs/user.html#connection-pooler
  enableConnectionPooler: false
  enableReplicaConnectionPooler: false
  # Connection pooler configuration. Ref: https://opensource.zalando.com/postgres-operator/docs/reference/operator_parameters.html#connection-pooler-configuration
  configConnectionPooler:
    # db schema to install lookup function into
    connection_pooler_schema: "pooler"
    # db user for pooler to use
    connection_pooler_user: "pooler"
    # docker image
    connection_pooler_image: "registry.opensource.zalan.do/acid/pgbouncer:master-32"
    # max db connections the pooler should hold
    connection_pooler_max_db_connections: 60
    # default pooling mode
    connection_pooler_mode: "transaction"
    # number of pooler instances
    connection_pooler_number_of_instances: 2
    # default resources
    connection_pooler_default_cpu_request: 500m
    connection_pooler_default_memory_request: 100Mi
    connection_pooler_default_cpu_limit: "1"
    connection_pooler_default_memory_limit: 100Mi

# Example values for postgresql
#
# postgresql:
#   enabled: true
#   teamId: "uds"
#   volume:
#     size: "1Gi"
#   numberOfInstances: 2
#   users:
#     mynamespace.myuser: []  # database owner
#     # yournamespace.youruser: []  # database owner
#   databases:
#     mydb: mynamespace.myuser
#     yourdb: yournamespace.youruser
#   extensions:
#     mydb: ["postgis","hstore"] # database extensions
#   version: "14"
#   ingress:
#     - remoteGenerated: Anywhere
# or
#   ingress:
#     - remoteNamespace: tempo
#       remoteSelector:
#         app.kubernetes.io/name: tempo

job:
  # Job image to use for running extension loading jobs (e.g. ghcr.io/zalando/spilo-17:4.0-p2 - needs the psql client)
  image: ""

additionalNetworkAllow: []
